<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharpunk</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #08060f 0%, #241a5e 45%, #5b2ea6 80%, #3ddc68 130%);
      color: #f2f2f2;
      font-family: system-ui, sans-serif;
      text-align: center;
    }
    img { width: min(90vw, 620px); position: fixed; top: 100px; left: 100px; }
    main { position: fixed; top: 2rem; right: 2rem; text-align: right; }
    h1 { letter-spacing: 0.3em; text-transform: uppercase; margin: 0 0 0.5rem; }
    p { color: #a8f5c0; margin: 0; }
  </style>
</head>
<body>
  <main>
    <img src="logo.svg" alt="Sharpunk logo">
    <h1>Sharpunk</h1>
    <p>Coming soon.</p>
  </main>
</body>
</html>
