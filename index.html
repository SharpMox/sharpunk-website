<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharpunk</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      box-sizing: border-box;
      display: grid;
      /* ponytail: rtl grid = first source item (text) fills the right column
         when wide, top row when wrapped — no media query needed */
      direction: rtl;
      grid-template-columns: repeat(auto-fit, minmax(min(480px, 100%), 1fr));
      align-items: start;
      gap: 50px;
      padding: 50px 50px 300px; /* room for the fixed game strip */
      background: linear-gradient(160deg, #08060f 0%, #241a5e 45%, #5b2ea6 80%, #3ddc68 130%);
      color: #f2f2f2;
      font-family: system-ui, sans-serif;
    }
    body > * { direction: ltr; }
    main { text-align: right; }
    img { width: min(100%, 620px); justify-self: left; }
    h1 { letter-spacing: 0.3em; text-transform: uppercase; margin: 0 0 0.5rem; }
    p { color: #a8f5c0; margin: 0; }

    /* shark game strip */
    #game {
      position: fixed; bottom: 0; left: 0; right: 0; height: 250px;
      overflow: hidden; touch-action: none; user-select: none;
    }
    #water {
      position: absolute; bottom: 0; left: 0; right: 0; height: 90px;
      background: rgba(61, 140, 220, 0.35);
      border-top: 2px solid rgba(160, 215, 255, 0.6);
      z-index: 1;
    }
    #game .sprite { position: absolute; font-size: 40px; line-height: 1; z-index: 2; }
    #game .decor { position: absolute; line-height: 1; pointer-events: none; }
    #shark { transform: scaleX(-1); } /* emoji faces left; flip to swim right */
    #score {
      position: absolute; top: 8px; right: 12px;
      font-family: monospace; font-size: 14px; color: #a8f5c0; z-index: 4;
    }
    #msg {
      position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
      font-family: monospace; font-size: 14px; color: #f2f2f2; white-space: nowrap; z-index: 4;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sharpunk</h1>
    <p>Coming soon.</p>
  </main>
  <img src="logo.svg" alt="Sharpunk logo">

  <div id="game">
    <div id="water"></div>
    <span id="shark" class="sprite">🦈</span>
    <span id="score"></span>
    <span id="msg">↑ / tap to play</span>
  </div>

  <script>
    // Shark runner. Coordinate system: y = shark's offset from the waterline
    // (px, positive = airborne, negative = submerged). Waterline = top of #water.
    const WATER = 90, SHARK_X = 200, DIVE_Y = -48;
    const game = document.getElementById('game'), sharkEl = document.getElementById('shark'),
          scoreEl = document.getElementById('score'), msgEl = document.getElementById('msg');

    let state = 'idle', y = 0, vy = 0, diving = false;
    let score = 0, hi = +localStorage.sharkHi || 0, t = 0, obstacles = [];

    // ponytail: frame-based physics like the original T-rex — no dt scaling,
    // assumes ~60fps; switch to dt if high-refresh screens feel too fast
    const GRAV = 0.5, JUMP_V = 11, BASE_SPEED = 5;

    function place(el, x, cy) { // cy = sprite center relative to waterline
      el.style.left = x + 'px';
      el.style.bottom = (WATER + cy - 20) + 'px';
    }

    function jump() {
      if (state !== 'run') return start();
      if (y <= 0 && !diving) vy = JUMP_V;
    }

    function start() {
      if (state === 'dead' || state === 'idle') {
        obstacles.forEach(o => o.el.remove());
        obstacles = []; score = 0; y = 0; vy = 0; state = 'run';
        msgEl.textContent = ''; sharkEl.textContent = '🦈';
      }
    }

    function spawn() {
      const boat = Math.random() < 0.5;
      const el = document.createElement('span');
      el.className = 'sprite';
      if (boat) {
        el.textContent = '⛵';
        el.style.fontSize = '100px';
      } else {
        // main rock breaking the surface + smaller rocks piled beneath it,
        // overflowing past the bottom of the strip
        el.innerHTML =
          '<span style="position:absolute;bottom:0;left:0;font-size:110px">🪨</span>' +
          '<span style="position:absolute;bottom:-35px;left:-30px;font-size:80px">🪨</span>' +
          '<span style="position:absolute;bottom:-50px;left:40px;font-size:90px">🪨</span>';
      }
      game.appendChild(el);
      // sailboat floats with its hull right on the waterline (dive under it);
      // rock pile is mostly submerged, tip above the surface (jump over it)
      obstacles.push({ el, x: innerWidth + 40, cy: boat ? 12 : -70, boat });
    }

    // parallax decor: seeded once, recycled by wrapping — no spawn/despawn.
    // bg (islands/clouds/doves) drifts at 0.3x game speed behind the water;
    // fg (coral/fish) at 1.5x in front of the game sprites.
    const decor = [];
    function seedDecor(defs, mult, z) {
      for (const [emoji, size, bottom] of defs) {
        const el = document.createElement('span');
        el.className = 'decor';
        el.textContent = emoji;
        el.style.fontSize = size + 'px';
        el.style.bottom = bottom + 'px';
        el.style.zIndex = z;
        game.appendChild(el);
        decor.push({ el, x: Math.random() * innerWidth, mult });
      }
    }
    seedDecor([ // sky + horizon, behind the water
      ['🏝️', 60, WATER - 10], ['🏝️', 44, WATER - 6],
      ['☁️', 48, 190], ['☁️', 36, 210], ['☁️', 42, 170],
      ['🕊️', 24, 185], ['🕊️', 20, 205],
    ], 0.3, 0);
    seedDecor([ // seabed + swimmers, in front of everything
      ['🪸', 48, -14], ['🪸', 38, -10], ['🪸', 44, -16], ['🪸', 36, -8],
      ['🐟', 24, 30], ['🐠', 26, 12], ['🐡', 22, 44], ['🐟', 20, 20],
    ], 1.5, 3);
    decor.forEach(d => { d.el.style.left = d.x + 'px'; });

    function die() {
      state = 'dead';
      hi = Math.max(hi, score); localStorage.sharkHi = hi;
      sharkEl.textContent = '💀';
      msgEl.textContent = 'GAME OVER — ↑ to restart';
    }

    function tick() {
      t++;
      if (state === 'run') {
        score += 0.15;
        const speed = BASE_SPEED + score * 0.002;

        if (y > 0 || vy > 0) { y += vy; vy -= GRAV; if (y < 0 && !diving) { y = 0; vy = 0; } }
        else y += ((diving ? DIVE_Y : 0) - y) * 0.3;

        const last = obstacles[obstacles.length - 1];
        if (!last || last.x < innerWidth - (300 + Math.random() * 400 + speed * 40)) spawn();

        for (const o of obstacles) {
          o.x -= speed;
          place(o.el, o.x, o.cy);
          // sail reaches all the way up (jumping always clips it); rock reaches all
          // the way down (diving always hits it) — each has exactly one escape
          const d = o.x - SHARK_X; // hitboxes trimmed to the visible glyph, not the em box
          if (o.boat ? (d > -85 && d < 30 && y > -26) : (d > -85 && d < 28 && y < 34)) die();
        }
        obstacles = obstacles.filter(o => o.x > -60 || (o.el.remove(), false));

        for (const d of decor) {
          d.x -= speed * d.mult;
          if (d.x < -100) d.x = innerWidth + 100;
          d.el.style.left = d.x + 'px';
        }
      } else if (state === 'idle') {
        y = Math.sin(t / 20) * 4; // idle bob
      }
      place(sharkEl, SHARK_X, y);
      scoreEl.textContent = 'HI ' + String(hi | 0).padStart(5, '0') + '  ' + String(score | 0).padStart(5, '0');
      requestAnimationFrame(tick);
    }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowUp' || e.code === 'Space') { e.preventDefault(); jump(); }
      if (e.code === 'ArrowDown') { e.preventDefault(); diving = true; if (state !== 'run') start(); }
    });
    addEventListener('keyup', e => { if (e.code === 'ArrowDown') diving = false; });

    // touch: tap = jump, hold = dive
    let holdTimer;
    game.addEventListener('touchstart', e => {
      e.preventDefault();
      holdTimer = setTimeout(() => { holdTimer = null; diving = true; if (state !== 'run') start(); }, 180);
    });
    game.addEventListener('touchend', () => {
      if (holdTimer) { clearTimeout(holdTimer); jump(); }
      diving = false;
    });

    tick();
  </script>
</body>
</html>
