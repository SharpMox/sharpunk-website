<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharpunk</title>
  <meta name="description" content="Sharpunk — web & games studio. Play the shark runner while you're here.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      box-sizing: border-box;
      display: grid;
      /* ponytail: rtl grid = first source item (text) fills the right column
         when wide, top row when wrapped — no media query needed */
      direction: rtl;
      grid-template-columns: repeat(auto-fit, minmax(min(480px, 100%), 1fr));
      align-items: start;
      gap: 50px;
      padding: 50px 50px 300px; /* room for the fixed game strip */
      background: linear-gradient(160deg, #08060f 0%, #241a5e 45%, #5b2ea6 80%, #3ddc68 130%);
      color: #f2f2f2;
      font-family: system-ui, sans-serif;
    }
    body > * { direction: ltr; }
    main { text-align: right; font-family: ui-monospace, monospace; min-width: 0; }
    img {
      /* out of the grid: pinned to the corner, bleeding off the top-left edge */
      /* height cap folded into width (art ratio 267.3:236.4 = 1.13) so the box
         always hugs the art — keeps the rotation axis on the art's center */
      --lw: max(135px, min(88vw, 682px, calc((100vh - 350px) * 1.13)));
      position: fixed; z-index: -1;
      width: var(--lw);
      /* bleed scales with the logo so it never vanishes off the corner */
      top: calc(var(--lw) * -0.3); left: calc(var(--lw) * -0.3);
      animation: spin 240s linear infinite;
    }
    @keyframes spin { from { transform: rotate(-45deg); } to { transform: rotate(315deg); } }
    h1 {
      letter-spacing: 0.3em; text-transform: uppercase; margin: 0 0 0.5rem;
      /* 8.5vw only bites below ~750px viewport; desktop stays at 4rem */
      font-size: clamp(1.6rem, 8.5vw, 4rem); color: #564b9c;
      -webkit-text-stroke: 6px #a2d741;
      paint-order: stroke fill; /* stroke behind fill = outline sits outside the letters */
    }
    p { color: #a2d741; margin: 0; }
    main a {
      display: inline-block; margin-top: 1.5rem; padding: 10px 22px;
      background: linear-gradient(135deg, #241a5e, #5b2ea6);
      border: 2px solid #a2d741; border-radius: 8px;
      color: #a2d741; text-decoration: none; letter-spacing: 0.15em;
    }
    main a:hover { filter: brightness(1.2); }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      25%      { transform: translate(2px, -4px); }
      50%      { transform: translate(-2px, -6px); }
      75%      { transform: translate(-3px, -2px); }
    }
    main a { animation: float 7s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { main a, img { animation: none; } }

    /* shark game strip */
    #game {
      position: fixed; bottom: 0; left: 0; right: 0; height: 250px;
      overflow: hidden; touch-action: none; user-select: none;
    }
    #water {
      position: absolute; bottom: 0; left: 0; right: 0; height: 90px;
      background: rgba(61, 140, 220, 0.35);
      border-top: 2px solid rgba(160, 215, 255, 0.6);
      z-index: 1;
    }
    #game .sprite { position: absolute; font-size: 40px; line-height: 1; z-index: 2; }
    #game .decor { position: absolute; line-height: 1; pointer-events: none; }
    #shark { transform: scaleX(-1); } /* emoji faces left; flip to swim right */
    #score, #msg, #mute, #info {
      position: absolute; z-index: 4;
      font-family: monospace; font-size: 17px; font-weight: bold; color: #fff; white-space: nowrap;
      background: rgba(247, 105, 173, 0.7); border: 2px solid #fff; /* logo pink */
      padding: 6px 14px; border-radius: 6px; line-height: 21px;
    }
    #score { top: 34px; right: 136px; }
    #mute, #info { top: 34px; cursor: pointer; font-size: 15px; padding: 6px 10px; }
    #mute { right: 74px; }
    #info { right: 12px; }
    #help {
      background: rgba(247, 105, 173, 0.7); color: #fff; border: 2px solid #fff; border-radius: 8px;
      font-family: monospace; font-size: 19px; font-weight: bold; padding: 0; line-height: 2;
      outline: none;
    }
    #hbody { padding: 24px 40px 24px 30px; position: relative; }
    #hx {
      position: absolute; top: 8px; right: 10px; cursor: pointer;
      background: none; border: none; color: #fff; font: bold 18px monospace; outline: none;
    }
    /* death-mode extras inside the help dialog (hidden until you die) */
    #gameover:not([hidden]) { display: block; font-size: 20px; margin-bottom: 10px; }
    #retry:not([hidden]) {
      display: block; margin-top: 16px; cursor: pointer; letter-spacing: 0.1em;
      background: rgba(247, 105, 173, 0.9); color: #fff; border: 2px solid #fff;
      border-radius: 6px; font: bold 16px monospace; padding: 8px 20px; outline: none;
    }
    #help::backdrop { background: rgba(8, 6, 15, 0.6); }
    #song {
      position: absolute; top: 10px; right: 12px; z-index: 4;
      font-family: monospace; font-size: 12px; color: #fff;
      text-decoration: none;
      max-width: calc(100vw - 24px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #song:hover { text-decoration: underline; }
    #msg { top: 90px; left: 50%; transform: translateX(-50%); text-transform: uppercase; }
    #msg:empty { display: none; }

    /* phones: tighter padding, smaller logo bleed, prompt below the HUD row */
    @media (max-width: 700px) {
      body { padding: 24px 24px 280px; gap: 24px; grid-template-columns: 1fr; }
      main { margin-top: 48px; }
      img { --lw: max(135px, min(75vw, 682px, calc((100vh - 350px) * 1.13))); }
      /* shrink the whole strip 20% for visibility; 125vw x 0.8 = full width */
      #game { width: 125vw; right: auto; transform: scale(0.8); transform-origin: bottom left; }
    }

    /* landscape phones: short viewport — cap title/logo by height so the
       header stops crowding the content and the game strip */
    @media (orientation: landscape) and (max-height: 500px) {
      body { padding: 12px 24px 220px; gap: 12px; }
      /* title + tagline + link on one row so the header clears the game strip */
      main { margin-top: 12px; display: flex; align-items: center;
             justify-content: flex-end; flex-wrap: wrap; gap: 6px 20px; }
      main h1, main a { margin: 0; }
      h1 { font-size: min(7vw, 8vh); -webkit-text-stroke-width: 4px; }
      img { --lw: max(110px, min(46vh, 40vw)); }
    }
  </style>
</head>
<body>
  <main>
    <h1>Sharpunk</h1>
    <p>WEB &amp; GAMES</p>
    <a href="https://sharpmox.github.io/NO-KINGS/codex.html">NO-KINGS CODEX</a>
  </main>
  <img src="logo.svg" alt="Sharpunk logo">

  <div id="game">
    <div id="water"></div>
    <span id="shark" class="sprite">🦈</span>
    <a id="song" href="https://www.newgrounds.com/audio/listen/1459250" target="_blank" rel="noopener">♪ Sea Shanty 2 (OSRS Remix) — JizzyJazz</a>
    <span id="score"></span>
    <span id="mute">🔊</span>
    <span id="info">ℹ️</span>
    <dialog id="help">
      <div id="hbody">
        <button id="hx">✕</button>
        <b id="gameover" hidden>💀 GAME OVER</b>
        <b>CONTROLS</b><br>
        ↑ / SPACE / TAP / swipe up — Jump<br>
        ↓ / swipe down — Dive<br>
        <b>OBSTACLES</b><br>
        ⛵ Dive under the boats<br>
        🪨 Jump over the rocks
        <button id="retry" hidden>▶ PLAY AGAIN</button>
      </div>
    </dialog>
    <span id="msg">↑ / tap to play</span>
    <audio id="bgm" src="bgm.mp3" loop preload="none"></audio>
  </div>

  <script>
    // Shark runner. Coordinate system: y = shark's offset from the waterline
    // (px, positive = airborne, negative = submerged). Waterline = top of #water.
    const WATER = 90, DIVE_Y = -48;
    const game = document.getElementById('game'), sharkEl = document.getElementById('shark'),
          scoreEl = document.getElementById('score'), msgEl = document.getElementById('msg'),
          bgm = document.getElementById('bgm'), muteEl = document.getElementById('mute');
    const W = () => game.clientWidth; // strip's coordinate width (125vw when scaled on phones)
    // narrow screens: hug the left edge for maximum reaction time
    const sharkX = () => W() < 625 ? 20 : Math.min(200, W() * 0.25);
    let SHARK_X = sharkX();
    addEventListener('resize', () => SHARK_X = sharkX());

    muteEl.addEventListener('click', () => {
      bgm.muted = !bgm.muted;
      muteEl.textContent = bgm.muted ? '🔇' : '🔊';
    });
    const helpEl = document.getElementById('help'), infoEl = document.getElementById('info'),
          retryEl = document.getElementById('retry'), gameoverEl = document.getElementById('gameover');
    // same dialog serves both roles: info (controls only) and death (adds GAME OVER + retry)
    function openHelp(death) {
      retryEl.hidden = gameoverEl.hidden = !death;
      if (!helpEl.open) helpEl.showModal(); // showModal throws if already open (info up when you die)
    }
    infoEl.addEventListener('click', () => openHelp(false));
    retryEl.addEventListener('click', () => { helpEl.close(); start(); });
    // clicks on the backdrop (outside #hbody) target the dialog itself
    helpEl.addEventListener('click', e => { if (e.target === helpEl) helpEl.close(); });
    document.getElementById('hx').addEventListener('click', () => helpEl.close());

    let state = 'idle', y = 0, vy = 0, diving = false;
    let score = 0, hi = +localStorage.sharkHi || 0, t = 0, obstacles = [];

    // ponytail: frame-based physics like the original T-rex — no dt scaling,
    // assumes ~60fps; switch to dt if high-refresh screens feel too fast
    const GRAV = 0.5, JUMP_V = 11, BASE_SPEED = 6;

    function place(el, x, cy) { // cy = sprite center relative to waterline
      el.style.left = x + 'px';
      el.style.bottom = (WATER + cy - 20) + 'px';
    }

    function jump() {
      if (state !== 'run') return start();
      if (y <= 0 && !diving) vy = JUMP_V;
    }

    function start() {
      if (state === 'dead' || state === 'idle') {
        obstacles.forEach(o => o.el.remove());
        obstacles = []; score = 0; y = 0; vy = 0; diving = false; state = 'run';
        msgEl.textContent = ''; sharkEl.textContent = '🦈';
        bgm.volume = 0.2; bgm.play(); // low volume; started from a user gesture
      }
    }

    function spawn() {
      const boat = Math.random() < 0.5;
      const el = document.createElement('span');
      el.className = 'sprite';
      if (boat) {
        el.textContent = '⛵';
        el.style.fontSize = '100px';
      } else {
        // main rock breaking the surface + smaller rocks piled beneath it,
        // overflowing past the bottom of the strip
        el.innerHTML =
          '<span style="position:absolute;bottom:0;left:0;font-size:110px">🪨</span>' +
          '<span style="position:absolute;bottom:-35px;left:-30px;font-size:80px">🪨</span>' +
          '<span style="position:absolute;bottom:-50px;left:40px;font-size:90px">🪨</span>';
      }
      game.appendChild(el);
      // sailboat floats with its hull right on the waterline (dive under it);
      // rock pile is mostly submerged, tip above the surface (jump over it)
      obstacles.push({ el, x: W() + 40, cy: boat ? 12 : -70, boat });
    }

    // parallax decor: seeded once, recycled by wrapping — no spawn/despawn.
    // bg (islands/clouds/doves) drifts at 0.3x game speed behind the water;
    // fg (coral/fish) at 1.5x in front of the game sprites.
    const decor = [];
    function seedDecor(defs, mult, z, opacity) {
      for (const [emoji, size, bottom] of defs) {
        const el = document.createElement('span');
        el.className = 'decor';
        el.textContent = emoji;
        el.style.fontSize = size + 'px';
        el.style.bottom = bottom + 'px';
        el.style.zIndex = z;
        if (opacity) el.style.opacity = opacity;
        game.appendChild(el);
        // clouds, birds and fish keep drifting while the game is paused; islands and coral don't
        const ambient = ['☁️', '🕊️', '🐟', '🐠', '🐡'].includes(emoji);
        decor.push({ el, x: Math.random() * W(), mult, ambient });
      }
    }
    seedDecor([ // sky + horizon, behind the water
      ['🏝️', 60, WATER - 10], ['🏝️', 44, WATER - 6],
      ['☁️', 48, 190], ['☁️', 36, 210], ['☁️', 42, 170],
      ['🕊️', 24, 185], ['🕊️', 20, 205],
    ], 0.3, 0, 0.55);
    seedDecor([ // seabed + swimmers, in front of everything
      ['🪸', 48, -14], ['🪸', 38, -10], ['🪸', 44, -16], ['🪸', 36, -8],
      ['🐟', 24, 30], ['🐠', 26, 12], ['🐡', 22, 44], ['🐟', 20, 20],
    ], 1.5, 3);
    decor.forEach(d => { d.el.style.left = d.x + 'px'; });

    function die() {
      state = 'dead';
      hi = Math.max(hi, score); localStorage.sharkHi = hi;
      sharkEl.textContent = '💀';
      msgEl.textContent = 'GAME OVER — ↑ to restart'; // shown if the modal is dismissed
      bgm.pause();
      openHelp(true);
    }

    function tick() {
      t++;
      if (state === 'run') {
        score += 0.15;
        // matches Chrome T-rex: start 6, accelerate ~0.001/frame, cap at 13
        // ponytail: narrow screen = mobile; 25% slower there for thumb reaction time
        const speed = Math.min(13, BASE_SPEED + score * 0.007) * (W() < 625 ? 0.75 : 1);

        if (y > 0 || vy > 0) { y += vy; vy -= GRAV; if (y < 0 && !diving) { y = 0; vy = 0; } }
        else y += ((diving ? DIVE_Y : 0) - y) * 0.3;

        const last = obstacles[obstacles.length - 1];
        if (!last || last.x < W() - (300 + Math.random() * 400 + speed * 40)) spawn();

        for (const o of obstacles) {
          o.x -= speed;
          place(o.el, o.x, o.cy);
          // sail reaches all the way up (jumping always clips it); rock reaches all
          // the way down (diving always hits it) — each has exactly one escape
          const d = o.x - SHARK_X; // hitboxes trimmed to the visible glyph, not the em box
          if (o.boat ? (d > -85 && d < 30 && y > -26) : (d > -85 && d < 28 && y < 34)) die();
        }
        obstacles = obstacles.filter(o => o.x > -60 || (o.el.remove(), false));

        for (const d of decor) {
          d.x -= speed * d.mult;
          if (d.x < -100) d.x = W() + 100;
          d.el.style.left = d.x + 'px';
        }
      } else {
        for (const d of decor) {
          if (!d.ambient) continue;
          d.x -= 0.4 * d.mult; // slowest drift while paused
          if (d.x < -100) d.x = W() + 100;
          d.el.style.left = d.x + 'px';
        }
        if (state === 'idle') y = Math.sin(t / 20) * 4; // idle bob
      }
      place(sharkEl, SHARK_X, y);
      scoreEl.textContent = 'HI ' + String(hi | 0).padStart(5, '0') + '  ' + String(score | 0).padStart(5, '0');
      requestAnimationFrame(tick);
    }

    addEventListener('keydown', e => {
      if (helpEl.open) {
        // death modal: a jump key retries; the info modal ignores game keys
        if (!retryEl.hidden && (e.code === 'ArrowUp' || e.code === 'Space')) {
          e.preventDefault(); helpEl.close(); start();
        }
        return;
      }
      if (e.code === 'ArrowUp' || e.code === 'Space') { e.preventDefault(); jump(); }
      if (e.code === 'ArrowDown') { e.preventDefault(); diving = true; if (state !== 'run') start(); }
    });
    addEventListener('keyup', e => { if (e.code === 'ArrowDown') diving = false; });

    // touch: swipe up = surface/jump, swipe down = dive (toggle, stays under),
    // tap = jump — anywhere on the page except real controls
    const isControl = e => e.target.closest('a, button, dialog, #mute, #info');
    const SWIPE = 24;
    let startY = null;
    document.addEventListener('touchstart', e => {
      if (isControl(e)) return;
      e.preventDefault(); // also blocks page scroll so a swipe drives the shark
      startY = e.touches[0].clientY;
    }, { passive: false });
    document.addEventListener('touchend', e => {
      if (isControl(e) || startY === null) return;
      const dy = e.changedTouches[0].clientY - startY;
      startY = null;
      if (dy < -SWIPE) { if (diving) diving = false; else jump(); }      // swipe up
      else if (dy > SWIPE) { diving = true; if (state !== 'run') start(); } // swipe down
      else jump();                                                        // tap
    });

    tick();
  </script>
</body>
</html>
